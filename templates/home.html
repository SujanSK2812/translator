<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English to Kannada Translator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgb(156, 156, 156);
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: none;
            font-size: 16px;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: #4e73df;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fc;
            border-radius: 8px;
            min-height: 50px;
            font-size: 16px;
            color: #333;
            word-wrap: break-word;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h2 {
                font-size: 20px;
            }

            textarea {
                font-size: 14px;
            }

            button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>English to Kannada Translator</h2>

        <form method="POST">
            {% csrf_token %}
            <textarea name="text" rows="4" placeholder="Enter The text"></textarea>
            <button type="submit">Translate</button>
        </form>

        <div class="output">
            {{ translated_text }}
        </div>
    </div>

</body>
</html>
